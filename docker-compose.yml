name: vpnhub
volumes:
  postgres_db_vol:
  pgadmin-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:
  db_postgres:
    image: postgres:16.4
    container_name: postgres_db_container
    env_file:
      - ./bot/.env
    volumes:
      - postgres_db_vol:/var/lib/postgresql/data
      # Backup mount: scripts/backup/postgres_backup.sh writes dumps here.
      # Pre-create on host before first `docker compose up`:
      #   mkdir -p /opt/vpnhub/backups/postgres
      - /opt/vpnhub/backups/postgres:/backups
    restart: unless-stopped
    stop_grace_period: 30s
    # Resource limits enforced via top-level fields (mem_limit/cpus).
    # deploy.resources is swarm-only and ignored by plain `docker compose up`.
    mem_limit: 2000m
    cpus: "1.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpnhub} -d ${POSTGRES_DB:-VPNHubBotDB}"]
      interval: 30s
      timeout: 5s
      retries: 5

  pgadmin:
    container_name: pgadmin_container
    image: dpage/pgadmin4:8.6
    depends_on:
      db_postgres:
        condition: service_healthy
    env_file:
      - ./bot/.env
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "127.0.0.1:5050:80"
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nats:
    image: nats:2.10.22
    container_name: vpnhub-nats-1
    restart: unless-stopped
    stop_grace_period: 30s
    entrypoint: /nats-server
    command: "-c /config/nats.conf"
    expose:
      - "4222"
    ports:
      - "127.0.0.1:8222:8222"
    volumes:
      - ./bot/nats/data:/data
      - ./bot/nats/nats.conf:/config/nats.conf
    mem_limit: 256m
    cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ✅ Sidecar healthcheck для NATS (потому что внутри nats контейнера нет sh)
  nats-health:
    image: curlimages/curl:8.6.0
    depends_on:
      - nats
    # контейнер просто висит
    command: ["sh", "-lc", "while true; do sleep 3600; done"]
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.1"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://nats:8222/varz"]
      interval: 30s
      timeout: 5s
      retries: 5

  nats-migrate:
    build:
      context: ./bot/nats/
      dockerfile: Dockerfile
    command: [ "poetry", "run", "python", "migration.py" ]
    restart: "no"
    volumes:
      - ./bot/nats/data:/data
      - ./bot/nats/nats.conf:/config/nats.conf
    mem_limit: 256m
    cpus: "0.5"
    depends_on:
      nats-health:
        condition: service_healthy

  redis:
    image: redis:7.4-alpine
    container_name: vpnhub-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    mem_limit: 192m
    cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  vpn_hub_bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: vpn_hub_bot
    ports:
      - "127.0.0.1:8888:8888"
    env_file:
      - ./bot/.env
    volumes:
      - ./logs:/app/logs
      - ./bot/bot/locale:/app/bot/locale
      - ./bot/bot/img:/app/bot/img
    restart: unless-stopped
    stop_grace_period: 90s
    mem_limit: 1500m
    cpus: "2.0"
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats-health:
        condition: service_healthy
      nats-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8888/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  nats-worker:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: vpnhub-nats-worker
    command: ["python", "-m", "worker_main"]
    env_file:
      - ./bot/.env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: "0.5"
    depends_on:
      db_postgres:
        condition: service_healthy
      nats-health:
        condition: service_healthy
      nats-migrate:
        condition: service_completed_successfully
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: vpnhub-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      vpn_hub_bot:
        condition: service_healthy
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: vpnhub-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    mem_limit: 256m
    cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
